<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script>
    // تسجيل عنصر (Component) لفلتر الكروما (المورف) لتطبيق الشفافية بثبات
    AFRAME.registerComponent('chromakey', {
      schema: {
        src: {type: 'selector'},
        color: {default: {x: 0, y: 1, z: 0}, type: 'vec3'} // الشفافية تعمل على اللون الأخضر
      },
      init: function () {
        var videoEl = this.data.src;
        if (!videoEl) return;
        var videoTexture = new THREE.VideoTexture(videoEl);
        videoTexture.minFilter = THREE.LinearFilter;
        var col = new THREE.Color(this.data.color.x, this.data.color.y, this.data.color.z);

        this.myMaterial = new THREE.ShaderMaterial({
          uniforms: {
            color: { type: 'c', value: col },
            texture: { type: 't', value: videoTexture }
          },
          vertexShader: `
            varying vec2 vUv;
            void main() {
              vUv = uv;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform vec3 color;
            uniform sampler2D texture;
            varying vec2 vUv;
            void main() {
              vec4 texColor = texture2D(texture, vUv);
              // حساب درجة التطابق مع اللون الأخضر
              float dist = length(texColor.rgb - color);
              // جعل اللون المتقارب شفافاً بالتدريج
              float alpha = smoothstep(0.3, 0.45, dist);
              gl_FragColor = vec4(texColor.rgb, alpha);
            }
          `,
          transparent: true
        });

        this.applyToMesh = this.applyToMesh.bind(this);
        this.el.addEventListener('model-loaded', this.applyToMesh);
        this.el.addEventListener('object3dset', this.applyToMesh);
        this.applyToMesh();
      },
      applyToMesh: function () {
        var mesh = this.el.getObject3D('mesh');
        if (mesh) mesh.material = this.myMaterial;
      }
    });
  </script>
</head>

<body>
  <!-- شاشة بداية لضمان تفاعل المستخدم (يحل مشاكل تشغيل الفيديو في جميع المتصفحات) -->
  <div id="startScreen"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; flex-direction: column; color: white; font-family: sans-serif;">
    <h2>تجربة الواقع المعزز</h2>
    <p>اضغط على الزر لتشغيل الكاميرا والفيديو</p>
    <button id="startButton"
      style="padding: 15px 30px; font-size: 18px; background: #06B6D4; color: white; border: none; border-radius: 8px; cursor: pointer;">بدأ
      التجربة</button>
  </div>

  <a-scene mindar-image="imageTargetSrc: ./crttargets.mind; filterMinCF: 0.0001; filterBeta: 0.1;"
    vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    <a-assets>
      <video id="arVideo" src="./my_video7.mp4" loop="true" crossorigin="anonymous" playsinline
        webkit-playsinline></video>
      <a-asset-item id="myModel" src="./model.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <!-- حاوية لعناصر الـ AR لتطبيق تأثير الظهور (Transition) -->
      <a-entity id="ar-container" scale="0 0 0"
        animation="property: scale; from: 0 0 0; to: 1 1 1; dur: 800; easing: easeOutElastic; startEvents: start-anim">

        <!-- استخدام العنصر مع كود إزالة الخلفية الخضراء، مقاس 1080×1920 -->
        <a-entity geometry="primitive: plane; width: 1; height: 1.778"
          chromakey="src: #arVideo; color: 0 1 0" position="0 0 0"></a-entity>

        <!-- نص إبداعي في الأسفل -->
        <a-text value="Made by SMADI AGENCY" position="0 -1.1 0" align="center" color="#FFFFFF" width="2.5"
          font="kelsonsans"></a-text>

        <!-- موديل 3D في الأعلى مع تأثير دوران خفيف -->
        <!-- تأكد من وضع ملف model.glb في نفس المجلد -->
        <a-gltf-model src="#myModel" position="0 1.2 0" scale="0.3 0.3 0.3"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear;"></a-gltf-model>
      </a-entity>
    </a-entity>
  </a-scene>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const startScreen = document.getElementById('startScreen');
      const startButton = document.getElementById('startButton');
      const video = document.getElementById('arVideo');
      const target = document.getElementById('target');
      const arContainer = document.getElementById('ar-container');

      // نظام تتبع الأخطاء لعرضها على شاشة الجوال
      const debugDiv = document.createElement('div');
      debugDiv.style.position = 'fixed';
      debugDiv.style.bottom = '10px';
      debugDiv.style.left = '10px';
      debugDiv.style.color = 'red';
      debugDiv.style.backgroundColor = 'white';
      debugDiv.style.padding = '5px';
      debugDiv.style.zIndex = '10000';
      debugDiv.style.fontSize = '12px';
      debugDiv.style.maxWidth = '90%';
      debugDiv.style.wordWrap = 'break-word';
      document.body.appendChild(debugDiv);

      window.addEventListener('error', function(event) {
        debugDiv.innerHTML += '<br>Err: ' + event.message;
      });
      window.addEventListener('unhandledrejection', function(event) {
        debugDiv.innerHTML += '<br>Rej: ' + (event.reason ? event.reason.message || event.reason : 'Unknown Promise Rejection');
      });

      // التقاط أخطاء الـ AR
      const scene = document.querySelector('a-scene');
      scene.addEventListener('arReady', () => {
         debugDiv.innerHTML += '<br>AR Ready!';
      });
      scene.addEventListener('arError', (ev) => {
         debugDiv.innerHTML += '<br>AR Error: Failed to start camera.';
      });

      // عند ضغط زر البداية
      startButton.addEventListener('click', function () {
        startScreen.style.display = 'none';

        // تفعيل الصوت بعد تفاعل المستخدم مع الشاشة
        video.muted = false;

        // تشغيل الفيديو وإيقافه فوراً لتعريف المتصفح
        try {
          var playPromise = video.play();
          if (playPromise !== undefined) {
            playPromise.then(_ => {
              video.pause();
            })
            .catch(error => {
              debugDiv.innerHTML += '<br>Play fail: ' + error;
            });
          }
        } catch (e) {
           debugDiv.innerHTML += '<br>Play err: ' + e.message;
        }
      });

      // تشغيل الفيديو عند رؤية الصورة
      target.addEventListener("targetFound", event => {
        debugDiv.innerHTML += "<br>Target Found!";
        video.play();
        // إطلاق حركة الظهور (Transition)
        arContainer.emit('start-anim');
      });

      // إيقاف الفيديو عند اختفاء الصورة
      target.addEventListener("targetLost", event => {
        debugDiv.innerHTML += "<br>Target Lost!";
        video.pause();
        arContainer.setAttribute('scale', '0 0 0');
      });
    });
  </script>
</body>

</html>
